name: CI/CD Pipeline
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  train-test:
    name: Train, Test, DVC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start MLflow server (SQLite backend) and set env
        run: |
          # start mlflow server in background and point CI to it
          nohup mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns --host 127.0.0.1 -p 5000 > mlflow.log 2>&1 &
          sleep 3
          echo "MLFLOW_TRACKING_URI=http://127.0.0.1:5000" >> $GITHUB_ENV
          echo "MLFLOW_EXPERIMENT=fake-review-hotel" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure DVC remote (optional)
        if: ${{ secrets.DVC_REMOTE_URL != '' }}
        run: |
          dvc remote add -d storage "${{ secrets.DVC_REMOTE_URL }}"
          echo 'DVC remote configured.'

      - name: Set AWS creds for DVC (optional)
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          dvc remote modify --local storage access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}"
          dvc remote modify --local storage secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Pull data from DVC remote (best-effort)
        run: |
          dvc pull || echo "dvc pull failed or no remote configured; continuing"

      - name: Reproduce pipeline
        run: |
          # ensure MLflow env is set for DVC-run scripts
          dvc repro

      - name: Run tests (if any)
        run: |
          if pytest -q; then echo "Tests passed"; else echo "No tests or tests failed"; fi

      - name: Push DVC artifacts (optional)
        if: ${{ secrets.DVC_REMOTE_URL != '' }}
        run: |
          dvc push

      - name: Upload MLflow runs and outputs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-and-outputs
          path: |
            mlruns
            mlflow.db
            outputs/latest
            models

  deploy:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: train-test
    if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fake-review:latest
